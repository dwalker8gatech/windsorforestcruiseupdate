# Netlify config — static site, no build step.
# Vercel auto-detects without this; Netlify reads it on every deploy.

[build]
  publish = "."
  command = ""

# Long-cache the image assets (they're content-addressed by filename).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Conservative security headers for the HTML.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
